name: Build and push Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to apply to the built image (e.g. v0.2.0, latest)"
        required: true
        type: string
        default: "latest"
      branch:
        description: "Branch/ref to build from"
        required: true
        default: "main"
        type: string

env:
  # Override via repo variables (Settings -> Actions -> Variables) to point
  # at a different registry or image path. Defaults target GHCR using this
  # repo's own name, auth'd via the built-in GITHUB_TOKEN below.
  REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout ${{ inputs.branch }}
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image reference
        id: image
        # Docker/GHCR image refs must be all-lowercase; IMAGE_NAME may come from
        # github.repository (owner/repo), which preserves whatever casing the
        # repo actually has.
        run: echo "ref=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: ${{ steps.image.outputs.ref }}:${{ inputs.tag }}
