apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "log-triage.fullname" . }}
  labels:
    {{- include "log-triage.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    # Single-writer state (SQLite + Drain3 file) on a ReadWriteOnce PVC can't be
    # mounted by two pods at once — Recreate avoids a stuck rollout waiting on
    # a volume the old pod still holds.
    type: Recreate
  selector:
    matchLabels:
      {{- include "log-triage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "log-triage.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "log-triage.serviceAccountName" . }}
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: log-triage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: LOGTRIAGE_CONFIG_PATH
              value: "/config/config.yaml"
            - name: LOGTRIAGE_OBJECT_STORE_BACKEND
              value: {{ .Values.objectStore.backend | quote }}
            {{- if eq .Values.objectStore.backend "s3" }}
            - name: LOGTRIAGE_S3__ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "log-triage.s3SecretName" . }}
                  key: accessKeyId
            - name: LOGTRIAGE_S3__SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "log-triage.s3SecretName" . }}
                  key: secretAccessKey
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "log-triage.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "log-triage.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
