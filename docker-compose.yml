services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Archival is off by default — Fluent Bit (or whatever transporter you
      # use) can ship raw logs to its own destination on its own; this service
      # only adds cluster_id/severity/muted enrichment on top if you need it.
      # Uncomment the MinIO service below and flip this to "s3" to try that.
      LOGTRIAGE_OBJECT_STORE_BACKEND: none
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10

  log-generator:
    image: python:3.11-slim
    command: ["python", "/scripts/generate_logs.py"]
    volumes:
      - ./docker/fluentbit/generate_logs.py:/scripts/generate_logs.py:ro
      - sample_logs:/var/log/generated

  fluent-bit:
    image: fluent/fluent-bit:3.1
    volumes:
      - ./docker/fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - sample_logs:/var/log/generated:ro
    depends_on:
      app:
        condition: service_healthy
      log-generator:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  # Optional: exercise the S3 object-store adapter locally against MinIO.
  # To enable: uncomment this block + createbuckets below, add to `app`'s
  # environment:
  #   LOGTRIAGE_OBJECT_STORE_BACKEND: s3
  #   LOGTRIAGE_S3__BUCKET: logtriage
  #   LOGTRIAGE_S3__ENDPOINT_URL: http://minio:9000
  #   LOGTRIAGE_S3__REGION: us-east-1
  #   LOGTRIAGE_S3__ACCESS_KEY_ID: minioadmin
  #   LOGTRIAGE_S3__SECRET_ACCESS_KEY: minioadmin
  # and add `depends_on: minio (service_healthy), createbuckets (service_completed_successfully)` to `app`.
  #
  # minio:
  #   image: minio/minio:RELEASE.2024-11-07T00-52-20Z
  #   command: server /data --console-address ":9001"
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10
  #
  # createbuckets:
  #   image: minio/mc:RELEASE.2024-11-05T11-29-45Z
  #   depends_on:
  #     minio:
  #       condition: service_healthy
  #   entrypoint: >
  #     /bin/sh -c "
  #     mc alias set local http://minio:9000 minioadmin minioadmin &&
  #     mc mb -p local/logtriage
  #     "

volumes:
  app_data:
  sample_logs:
