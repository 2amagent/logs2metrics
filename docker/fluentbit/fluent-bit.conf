[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

[INPUT]
    Name         tail
    Path         /var/log/generated/sample.log
    Path_Key     source_file
    Tag          app.logs
    Read_from_Head true

[OUTPUT]
    Name          http
    Match         app.logs
    Host          app
    Port          8000
    URI           /ingest
    Format        json
    Json_date_key false
    tls           Off
